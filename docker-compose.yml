services:
  studio:
    build: .
    image: ghcr.io/YOUR_USERNAME/gorbandpleckstudio:latest
    container_name: gorbandpleckstudio
    ports:
      - "8499:8499"
    volumes:
      # ixvolume - persistent app data (SQLite DB)
      - studio-data:/data
      # Host path - episode assets (images, videos)
      # Adjust host path to your TrueNAS dataset
      - /mnt/pool/path/to/episodes:/episodes
    env_file:
      - .env
    restart: unless-stopped

volumes:
  studio-data:
