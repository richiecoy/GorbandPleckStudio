<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <title>API Preview &mdash; {{ title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'JetBrains Mono', monospace;
            background: #0a0a0f;
            color: #e0e0ec;
            margin: 0;
            padding: 1rem;
        }
        h2 { font-size: 0.95rem; margin-bottom: 0.75rem; color: #8888a0; font-weight: 500; }
        pre {
            background: #12121a;
            border: 1px solid #2a2a3a;
            border-radius: 8px;
            padding: 1rem;
            font-size: 0.8rem;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-all;
            overflow-y: auto;
            max-height: calc(100vh - 4rem);
        }
    </style>
</head>
<body>
    <h2>{{ title }}</h2>
    <pre>{{ payload_json }}</pre>
</body>
</html>
